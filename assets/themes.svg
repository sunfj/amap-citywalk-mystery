<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#ffd700" font-size="28" font-weight="bold">🎭 AI CityWalk 剧本杀 · 五大主题</text>
  <text x="500" y="72" text-anchor="middle" fill="#8892b0" font-size="14">每个主题都有真实城市 Demo · 覆盖 5 座城市 · 5 种体验</text>
  
  <!-- Card 1: 悬疑侦探 -->
  <rect x="20" y="95" width="184" height="280" rx="12" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
  <rect x="20" y="95" width="184" height="60" rx="12" fill="#e94560"/>
  <rect x="20" y="143" width="184" height="12" fill="#1a1a2e"/>
  <text x="112" y="130" text-anchor="middle" fill="white" font-size="22" font-weight="bold">🔍 悬疑侦探</text>
  <text x="112" y="185" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold">杭州 · 西湖迷踪</text>
  <text x="112" y="210" text-anchor="middle" fill="#ccd6f6" font-size="11">一封跨越百年的密信</text>
  <text x="112" y="230" text-anchor="middle" fill="#8892b0" font-size="10">纯真年代书吧 → 西泠印社</text>
  <text x="112" y="248" text-anchor="middle" fill="#8892b0" font-size="10">→ 郭宅 → 张小泉剪刀店</text>
  <line x1="50" y1="262" x2="174" y2="262" stroke="#302b63" stroke-width="1"/>
  <text x="112" y="282" text-anchor="middle" fill="#8892b0" font-size="10">📏 8.4km · ⏱ 114分钟</text>
  <text x="112" y="300" text-anchor="middle" fill="#8892b0" font-size="10">👥 2人 · 🏷️ 半天</text>
  <text x="112" y="320" text-anchor="middle" fill="#ffd700" font-size="10">POI: 140100|140200|140600</text>
  <text x="112" y="340" text-anchor="middle" fill="#5a6684" font-size="9">老建筑 · 博物馆 · 书店</text>
  <text x="112" y="360" text-anchor="middle" fill="#5a6684" font-size="9">线索: 数字密码 · 文字谜语</text>
  
  <!-- Card 2: 历史穿越 -->
  <rect x="216" y="95" width="184" height="280" rx="12" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="216" y="95" width="184" height="60" rx="12" fill="#f59e0b"/>
  <rect x="216" y="143" width="184" height="12" fill="#1a1a2e"/>
