  <text x="500" y="425" text-anchor="middle" fill="#ffd700" font-size="16" font-weight="bold">📊 项目数据总览</text>
  
  <text x="130" y="460" text-anchor="middle" fill="#e94560" font-size="24" font-weight="bold">5</text>
  <text x="130" y="478" text-anchor="middle" fill="#8892b0" font-size="11">个完整 Demo</text>
  
  <text x="310" y="460" text-anchor="middle" fill="#f59e0b" font-size="24" font-weight="bold">5</text>
  <text x="310" y="478" text-anchor="middle" fill="#8892b0" font-size="11">座城市覆盖</text>
  
  <text x="490" y="460" text-anchor="middle" fill="#10b981" font-size="24" font-weight="bold">4</text>
  <text x="490" y="478" text-anchor="middle" fill="#8892b0" font-size="11">个高德 API</text>
  
  <text x="670" y="460" text-anchor="middle" fill="#ec4899" font-size="24" font-weight="bold">20</text>
  <text x="670" y="478" text-anchor="middle" fill="#8892b0" font-size="11">个真实 POI 站点</text>
  
  <text x="850" y="460" text-anchor="middle" fill="#a78bfa" font-size="24" font-weight="bold">30.3</text>
  <text x="850" y="478" text-anchor="middle" fill="#8892b0" font-size="11">km 总步行路线</text>
  
  <!-- API Badges -->
  <rect x="120" y="510" width="140" height="32" rx="16" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1"/>
  <text x="190" y="531" text-anchor="middle" fill="#06b6d4" font-size="12">🔍 POI 搜索 API</text>
  
  <rect x="280" y="510" width="140" height="32" rx="16" fill="#1a1a2e" stroke="#10b981" stroke-width="1"/>
  <text x="350" y="531" text-anchor="middle" fill="#10b981" font-size="12">🚶 路径规划 API</text>
  
  <rect x="440" y="510" width="140" height="32" rx="16" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="510" y="531" text-anchor="middle" fill="#f59e0b" font-size="12">🌤️ 天气查询 API</text>
  
  <rect x="600" y="510" width="140" height="32" rx="16" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1"/>
