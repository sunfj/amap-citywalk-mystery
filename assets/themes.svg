  <text x="892" y="340" text-anchor="middle" fill="#5a6684" font-size="9">书店 · 画廊 · 文创园区</text>
  <text x="892" y="360" text-anchor="middle" fill="#5a6684" font-size="9">线索: 拍照打卡 · 手绘速写</text>
  
